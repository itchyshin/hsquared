url: https://itchyshin.github.io/hsquared/
destination: pkgdown-site
template:
  bootstrap: 5
  bslib:
    bg: "#ffffff"
    fg: "#0f2533"
    primary: "#0284c7"
    secondary: "#475569"
    headings-color: "#082f49"
    link-color: "#0369a1"
    link-hover-color: "#075985"
    border-color: "#bae6fd"

navbar:
  structure:
    left: [intro, articles, reference, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
        - text: Getting started
          href: articles/hsquared.html
        - text: Fitting models
          href: articles/fitting-models.html
        - text: Worked example (gryphon)
          href: articles/gryphon-worked-example.html
        - text: Genomic prediction
          href: articles/genomic-prediction.html
        - text: QTL, GWAS, and eQTL status
          href: articles/qtl-gwas-eqtl-status.html
        - text: Multivariate Gaussian animal models
          href: articles/multivariate.html
        - text: Reading G matrices
          href: articles/g-matrix-interpretation.html
        - text: Inheritance systems roadmap
          href: articles/inheritance-systems.html
        - text: Model status
          href: articles/model-status.html
        - text: Validation evidence
          href: articles/validation-evidence.html
        - text: "Benchmark: sommer & pedigreemm"
          href: articles/benchmark-comparators.html
        - text: "Two-effect model: sommer comparator"
          href: articles/two-effect-comparator.html
        - text: "Random regression (k = 2): sommer comparator"
          href: articles/rr-comparator.html
        - text: Formula grammar roadmap
          href: articles/formula-grammar.html
        - text: Genomics and GPU roadmap
          href: articles/genomics-gpu-roadmap.html

reference:
  - title: Start here
    desc: Current parser entry points and planned fitting controls.
    contents:
      - hs_data
      - data_status
      - hsquared
      - hs_control
      - backend_info
      - formula_status
      - validation_status
      - model_spec
      - animal
      - genomic_markers
      - qg_effect_markers
  - title: Extractor contract
    desc: Extractors for fitted `hsquared_fit` objects. The default `hsquared()` call fits the v0.1 Gaussian animal model; repeatability, two-effect, genomic, SNP-BLUP, multivariate, and random-regression outputs come from opt-in experimental targets.
    contents:
      - variance_components
      - heritability
      - heritability_interval
      - variance_component_standard_errors
      - multivariate_extractors
      - covariance_standard_errors
      - covariance_structure_lrt
      - gamma_matrix
      - metafounder_groups
      - metafounder_effects
      - factor_g_extractors
      - g_matrix_geometry
      - breeding_values
      - repeatability
      - repeatability_interval
      - permanent_effects
      - common_env_effects
      - maternal_effects
      - common_env_proportion
      - maternal_proportion
      - common_env_proportion_interval
      - direct_maternal_extractors
      - direct_heritability
      - total_heritability
      - direct_variance
      - partner_variance
      - direct_maternal_covariance
      - random_regression_extractors
      - prediction_error_variance
      - reliability
      - fit_diagnostics
      - plot.hsquared_fit
      - inference_blocks
      - marker_extractors
      - gwas
      - fixef
      - ranef
      - response_scale_methods
  - title: Visualization
    contents:
      - hsquared-autoplot
      - theme_hsquared
      - hs_recovery_forest
  - title: Package
    contents:
      - hsquared-package

articles:
  - title: Start here
    contents:
      - hsquared
      - articles/fitting-models
      - articles/gryphon-worked-example
      - articles/visualizing-models
      - articles/genomic-prediction
      - articles/qtl-gwas-eqtl-status
      - articles/multivariate
      - articles/g-matrix-interpretation
      - articles/inheritance-systems
      - articles/model-status
      - articles/validation-evidence
      - articles/benchmark-comparators
      - articles/two-effect-comparator
      - articles/multi-effect-comparator
      - articles/rr-comparator
      - articles/formula-grammar
      - articles/genomics-gpu-roadmap
