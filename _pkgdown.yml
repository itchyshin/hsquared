url: https://itchyshin.github.io/hsquared/
destination: pkgdown-site
template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#126a73"
    headings-color: "#1b2f33"
    link-color: "#126a73"

navbar:
  structure:
    left: [intro, articles, reference, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
        - text: Getting started
          href: articles/hsquared.html
        - text: Mission control
          href: articles/mission-control.html
        - text: Model status
          href: articles/model-status.html
        - text: Formula grammar roadmap
          href: articles/formula-grammar.html
        - text: Genomics and GPU roadmap
          href: articles/genomics-gpu-roadmap.html

reference:
  - title: Start here
    desc: Current parser entry points and planned fitting controls.
    contents:
      - hs_data
      - data_status
      - hsquared
      - hs_control
      - backend_info
      - formula_status
      - validation_status
      - model_spec
      - animal
      - genomic_markers
      - qg_effect_markers
  - title: Extractor contract
    desc: Extractors for fitted `hsquared_fit` objects. The default `hsquared()` call fits the v0.1 Gaussian animal model; `repeatability()`/`permanent_effects()` and `common_env_effects()` come from the opt-in, experimental two-effect models.
    contents:
      - variance_components
      - heritability
      - breeding_values
      - repeatability
      - permanent_effects
      - common_env_effects
      - maternal_effects
      - prediction_error_variance
      - reliability
      - fit_diagnostics
      - marker_extractors
      - fixef
      - ranef
  - title: Package
    contents:
      - hsquared-package

articles:
  - title: Start here
    contents:
      - hsquared
      - articles/mission-control
      - articles/model-status
      - articles/formula-grammar
      - articles/genomics-gpu-roadmap
